<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileHost — Login</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f13;
            color: #e0e0e0;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #1a1a24;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }
        h1 {
            font-size: 22px; font-weight: 600; margin-bottom: 8px;
            text-align: center;
        }
        .subtitle { color: #777; font-size: 13px; text-align: center; margin-bottom: 28px; }
        label { display: block; font-size: 13px; color: #999; margin-bottom: 6px; }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: #12121a;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            transition: border .2s;
        }
        input[type="password"]:focus { border-color: #6c5ce7; }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #6c5ce7;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        button:hover { background: #7c6cf7; }
        .error {
            background: #3a1a1a; color: #f77;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .no-pass {
            text-align: center;
            color: #f77;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 FileHost</h1>
        <p class="subtitle">{{ request.host }}</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        {% if has_password %}
        <form method="POST" action="/login">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   placeholder="Enter password" autofocus required>
            <button type="submit">Sign In</button>
        </form>
        {% else %}
        <div class="no-pass">No password configured. Contact admin.</div>
        {% endif %}
    </div>
</body>
</html>
